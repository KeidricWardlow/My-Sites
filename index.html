<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pie Chart Maker</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>Pie Chart Maker</h1>
        <div id="chart-container">
            <canvas id="pieChart" width="400" height="400"></canvas>
        </div>
        <div>
            <label for="measurement">Add Measurement:</label>
            <input type="number" id="measurement" placeholder="Value" />
            <input type="text" id="label" placeholder="Label" />
            <input type="color" id="color" value="#ff6384" />
            <button id="addMeasurement">Add</button>
        </div>
        <div>
            <label for="chartType">Chart Type:</label>
            <select id="chartType">
                <option value="pie">Pie</option>
                <option value="doughnut">Doughnut</option>
                <option value="bar">Bar</option>
            </select>
        </div>
        <div>
            <label for="editLabel">Edit Label:</label>
            <input type="text" id="editLabel" placeholder="Current Label" />
            <button id="updateLabel">Update</button>
        </div>
        <button id="saveChart">Save as JPG</button>
        <button id="toggleTheme">Toggle Day/Night Theme</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
